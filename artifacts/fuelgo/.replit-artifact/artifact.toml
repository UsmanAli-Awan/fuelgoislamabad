kind = "web"
previewPath = "/"
title = "FuelGo Islamabad"
version = "1.0.0"
id = "artifacts/fuelgo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26224

[services.development]
run = "pnpm --filter @workspace/fuelgo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fuelgo", "run", "build" ]
publicDir = "artifacts/fuelgo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26224"
BASE_PATH = "/"
